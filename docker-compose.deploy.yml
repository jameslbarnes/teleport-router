version: '3.8'

services:
  router:
    image: docker.io/generalsemantics/teleport-router:9081484@sha256:ed09f91306096b769d90f2dc59f1b17673235defa379b5fde8ce039b74ef0a93
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - STAGING_DELAY_MS=3600000
      - GIT_SHA=9081484
      - IMAGE_DIGEST=sha256:ed09f91306096b769d90f2dc59f1b17673235defa379b5fde8ce039b74ef0a93
      - MODERATOR_HANDLES=router,router_agent,james,socrates1024
      # Names only — values injected via encrypted --env-file at deploy time
      - BASE_URL
      - FIREBASE_SERVICE_ACCOUNT_BASE64
      - ANTHROPIC_API_KEY
      - SENDGRID_API_KEY
      - SENDGRID_FROM_EMAIL
      - ROUTER_AGENT_HANDLES_MATRIX=1
    volumes:
      - router-data:/data
    restart: unless-stopped

  router-agent:
    image: docker.io/generalsemantics/teleport-router-agent:latest
    environment:
      # Names only — values injected via encrypted --env-file at deploy time
      - ANTHROPIC_API_KEY
      - ROUTER_MCP_URL=http://router:3000/mcp/http
      - ROUTER_SECRET_KEY
      # Temporary compatibility with persisted encrypted env from the old deployment name.
      - HERMES_SECRET_KEY
      - HERMES_AGENT_SECRET_KEY
      - ROUTER_HANDLE=router
      - ROUTER_ENABLE_GATEWAY=0
      - TELEGRAM_BOT_TOKEN
      - GITHUB_TOKEN
    volumes:
      - router-data:/data
    depends_on:
      - router
    restart: unless-stopped

  dstack-ingress:
    image: dstacktee/dstack-ingress:20250929@sha256:2b47b3e538df0b3e7724255b89369194c8c83a7cfba64d2faf0115ad0a586458
    ports:
      - "443:443"
    environment:
      - DOMAIN=router.teleport.computer
      - DNS_PROVIDER=cloudflare
      - CLOUDFLARE_API_TOKEN
      - GATEWAY_DOMAIN=_.dstack-pha-prod9.phala.network
      - CERTBOT_EMAIL=james@generalsemantics.nyc
      - SET_CAA=true
      - TARGET_ENDPOINT=http://router:3000
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - cert-data-cf:/etc/letsencrypt
    depends_on:
      - router
    restart: unless-stopped

  hermes-ingress:
    image: dstacktee/dstack-ingress:20250929@sha256:2b47b3e538df0b3e7724255b89369194c8c83a7cfba64d2faf0115ad0a586458
    ports:
      - "444:444"
    environment:
      - DOMAIN=hermes.teleport.computer
      - DNS_PROVIDER=cloudflare
      - CLOUDFLARE_API_TOKEN
      - GATEWAY_DOMAIN=_.dstack-pha-prod9.phala.network
      - CERTBOT_EMAIL=james@generalsemantics.nyc
      - SET_CAA=true
      - TARGET_ENDPOINT=http://router:3000
      - PORT=444
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - hermes-cert-data-cf:/etc/letsencrypt
    depends_on:
      - router
    restart: unless-stopped

volumes:
  router-data:
  cert-data-cf:
  hermes-cert-data-cf:
