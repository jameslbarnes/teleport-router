name: Build and Push Docker Image

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to Phala after build'
        required: true
        type: boolean
        default: false

env:
  REGISTRY: docker.io
  IMAGE_NAME: generalsemantics/teleport-router
  AGENT_IMAGE_NAME: generalsemantics/teleport-router-agent

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
      agent_digest: ${{ steps.agent_build.outputs.digest }}
      agent_tags: ${{ steps.agent_meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run server tests
        working-directory: server
        run: npm test

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Verify Shape Matrix bridge artifact
        run: test -f server/dist/shape-matrix-bridge.js

      - name: Validate compose topology
        env:
          GIT_SHA: ci
          IMAGE_DIGEST: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          AGENT_IMAGE_DIGEST: sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
        run: node scripts/shape-compose-boundary-check.mjs

      - name: Validate agent Matrix boundary
        run: node scripts/shape-agent-boundary-check.mjs

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Extract agent metadata
        id: agent_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.AGENT_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      - name: Build and push agent
        id: agent_build
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          file: ./agent/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.agent_meta.outputs.tags }}
          labels: ${{ steps.agent_meta.outputs.labels }}
          cache-from: type=gha,scope=agent
          cache-to: type=gha,scope=agent,mode=max

      - name: Output digest
        run: |
          echo "## Docker Image Attestation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Agent Image:** \`${{ env.AGENT_IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Agent Digest:** \`${{ steps.agent_build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verification" >> $GITHUB_STEP_SUMMARY
          echo "To verify the Phala TEE attestation matches this build:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# 1. Get attestation from Phala dashboard or /attestation endpoint" >> $GITHUB_STEP_SUMMARY
          echo "# 2. Compare the image digests in vm_config with:" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.agent_build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Phala CLI
        run: npm install -g phala

      - name: Generate compose file
        env:
          GIT_SHA_FULL: ${{ github.sha }}
          IMAGE_DIGEST: ${{ needs.build.outputs.digest }}
          AGENT_IMAGE_DIGEST: ${{ needs.build.outputs.agent_digest }}
        run: |
          # Only non-secret values go into the compose (visible in TEE metadata)
          export GIT_SHA=$(echo "$GIT_SHA_FULL" | cut -c1-7)
          envsubst < docker-compose.template.yml > docker-compose.deploy.yml
          cat docker-compose.deploy.yml

      - name: Log in to Docker Hub for deploy verification
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Verify generated deploy compose and image
        run: SHAPE_COMPOSE_PULL_IMAGE=1 node scripts/shape-compose-boundary-check.mjs --check-image docker-compose.deploy.yml

      - name: Deploy to Phala Cloud
        run: |
          # Compose-only deploy — encrypted env vars are set in Phala dashboard
          # and persist across deploys. CI only updates the image tag.
          phala deploy --cvm-id ${{ secrets.PHALA_APP_ID }} -c docker-compose.deploy.yml
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_API_KEY }}

      - name: Cleanup
        if: always()
        run: rm -f docker-compose.deploy.yml

      - name: Wait for TEE to restart
        run: sleep 30

      - name: Archive evidences
        run: |
          TEE_HOST="${{ secrets.PHALA_APP_ID }}-8090.dstack-pha-prod9.phala.network"
          DATE=$(date -u +%Y-%m-%d)
          DIR="evidences/$DATE"
          mkdir -p "$DIR"

          # Fetch attestation artifacts from TEE metadata endpoint
          curl -sf "https://$TEE_HOST/" -o "$DIR/metadata-raw.json" || echo "Warning: could not fetch metadata"
          curl -sf "https://$TEE_HOST/quote" -o "$DIR/quote.json" || echo "Warning: could not fetch quote"

          # Redact secrets from metadata before committing
          if [ -f "$DIR/metadata-raw.json" ]; then
            SECRET_ENV_RE='(ANTHROPIC_API_KEY|SENDGRID_API_KEY|FIREBASE_SERVICE_ACCOUNT_BASE64|FIRECRAWL_API_KEY|CLOUDFLARE_API_TOKEN|TELEGRAM_BOT_TOKEN|TELEGRAM_BOT_SECRET_KEY|ROUTER_SECRET_KEY|HERMES_SECRET_KEY|HERMES_AGENT_SECRET_KEY|SHAPE_ROUTER_SECRET_KEY|MATRIX_SERVER_URL|MATRIX_HOMESERVER|MATRIX_SERVER_NAME|MATRIX_BOT_SECRET_KEY|MATRIX_ACCESS_TOKEN|MATRIX_USER_ID|MATRIX_DEVICE_ID|MATRIX_CRYPTO_SECRET|MATRIX_BOT_HANDLE|MATRIX_SPACE_ROOM_ID|MATRIX_REGISTRATION_TOKEN|MATRIX_SIGNUP_URL|GITHUB_TOKEN|GH_TOKEN)'
            sed -E \
              -e "s/(${SECRET_ENV_RE}=)[^\",\\\\[:space:]]*/\\1[REDACTED]/g" \
              -e "s/(\"${SECRET_ENV_RE}\"[[:space:]]*:[[:space:]]*\")[^\"]*/\\1[REDACTED]/g" \
              -e "s/(\\\\\"${SECRET_ENV_RE}\\\\\"[[:space:]]*:[[:space:]]*\\\\\")[^\\\\\"]*/\\1[REDACTED]/g" \
              -e "s/(&#34;${SECRET_ENV_RE}&#34;[[:space:]]*:[[:space:]]*&#34;)[^&]*/\\1[REDACTED]/g" \
              "$DIR/metadata-raw.json" > "$DIR/metadata.json"
            rm "$DIR/metadata-raw.json"
          fi

          # Record deployment context
          cat > "$DIR/deploy-info.json" <<EOF
          {
          "git_sha": "${{ github.sha }}",
          "git_sha_short": "$(echo ${{ github.sha }} | cut -c1-7)",
          "image_digest": "${{ needs.build.outputs.digest }}",
          "agent_image_digest": "${{ needs.build.outputs.agent_digest }}",
          "app_id": "${{ secrets.PHALA_APP_ID }}",
          "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
          "workflow_run": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

          ls -la "$DIR"

      - name: Commit evidences to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add evidences/
          if git diff --cached --quiet; then
            echo "No new evidences to commit"
          else
            git commit -m "chore: archive TEE evidences for $(date -u +%Y-%m-%d) deploy"
            git push
          fi

      - name: Deployment summary
        run: |
          echo "## Phala TEE Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployed to Phala Cloud CVM" >> $GITHUB_STEP_SUMMARY
          echo "**App ID:** \`${{ secrets.PHALA_APP_ID }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image Digest:** \`${{ needs.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Agent Digest:** \`${{ needs.build.outputs.agent_digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**KMS:** Pha (cloud) — Base on-chain KMS pending CVM recreation" >> $GITHUB_STEP_SUMMARY
          echo "**Evidences:** Archived to \`evidences/$(date -u +%Y-%m-%d)/\`" >> $GITHUB_STEP_SUMMARY
