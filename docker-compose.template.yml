version: '3.8'

services:
  router:
    image: docker.io/generalsemantics/teleport-router:${GIT_SHA}@${IMAGE_DIGEST}
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - STAGING_DELAY_MS=3600000
      - GIT_SHA=${GIT_SHA}
      - IMAGE_DIGEST=${IMAGE_DIGEST}
      - MODERATOR_HANDLES=router,router_agent,james,socrates1024
      # Names only — values injected via encrypted --env-file at deploy time
      - BASE_URL
      - FIREBASE_SERVICE_ACCOUNT_BASE64
      - ANTHROPIC_API_KEY
      - MODERATOR_URL=https://8f20c29f45571bade4b63d0f704faa926af53e7c-3000.dstack-pha-prod5.phala.network
      - MODERATOR_API_KEY
      - SENDGRID_API_KEY
      - SENDGRID_FROM_EMAIL
    volumes:
      - router-data:/data
    restart: unless-stopped

  shape-matrix-bridge:
    image: docker.io/generalsemantics/teleport-router:${GIT_SHA}@${IMAGE_DIGEST}
    command: ["node", "dist/shape-matrix-bridge.js"]
    environment:
      # Matrix is intentionally hosted by this bridge process, not by the
      # public Router server. Notebook reads/writes go to the private Shape
      # Router instance below.
      - SHAPE_ROUTER_BASE_URL=https://shaperotator.teleport.computer
      - SHAPE_ROUTER_SECRET_KEY
      - SHAPE_MATRIX_BRIDGE_TAGS=shape-rotator,matrix
      - SHAPE_MATRIX_PUBLISH_IMMEDIATELY=1
      - SHAPE_MATRIX_ENABLE_ONBOARDING=0
      - SHAPE_MATRIX_STARTUP_EVENT_GRACE_MS=5000
      - ANTHROPIC_API_KEY
      - MATRIX_SERVER_URL=https://mtrx.shaperotator.xyz
      - MATRIX_SERVER_NAME=mtrx.shaperotator.xyz
      - MATRIX_BOT_SECRET_KEY
      - MATRIX_ACCESS_TOKEN
      - MATRIX_USER_ID
      - MATRIX_DEVICE_ID
      - MATRIX_CRYPTO_SECRET
      - MATRIX_BOT_HANDLE
      - MATRIX_SPACE_ROOM_ID=!4FL8uL5OEYLATG1VH4wC2CD3pfIV6BMFId9VT7rmm-g
      - MATRIX_REGISTRATION_TOKEN
      - MATRIX_SIGNUP_URL=https://mtrx.shaperotator.xyz/signup/api
    volumes:
      - shape-matrix-bridge-data:/data
    restart: unless-stopped

  router-agent:
    image: docker.io/generalsemantics/teleport-router-agent:${GIT_SHA}@${AGENT_IMAGE_DIGEST}
    environment:
      # Names only — values injected via encrypted --env-file at deploy time
      - ANTHROPIC_API_KEY
      - ROUTER_MCP_URL=http://router:3000/mcp/http
      - ROUTER_SECRET_KEY
      # Temporary compatibility with persisted encrypted env from the old deployment name.
      - HERMES_SECRET_KEY
      - HERMES_AGENT_SECRET_KEY
      - ROUTER_HANDLE=router
      - ROUTER_ENABLE_GATEWAY=0
      - TELEGRAM_BOT_TOKEN
      - GITHUB_TOKEN
    volumes:
      - router-data:/data
    depends_on:
      - router
    restart: unless-stopped

  dstack-ingress:
    image: dstacktee/dstack-ingress:20250929@sha256:2b47b3e538df0b3e7724255b89369194c8c83a7cfba64d2faf0115ad0a586458
    ports:
      - "443:443"
    environment:
      - DOMAIN=router.teleport.computer
      - DNS_PROVIDER=cloudflare
      - CLOUDFLARE_API_TOKEN
      - GATEWAY_DOMAIN=_.dstack-pha-prod9.phala.network
      - CERTBOT_EMAIL=james@generalsemantics.nyc
      - SET_CAA=true
      - TARGET_ENDPOINT=http://router:3000
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - cert-data-cf:/etc/letsencrypt
    depends_on:
      - router
    restart: unless-stopped

  hermes-ingress:
    image: dstacktee/dstack-ingress:20250929@sha256:2b47b3e538df0b3e7724255b89369194c8c83a7cfba64d2faf0115ad0a586458
    ports:
      - "444:444"
    environment:
      - DOMAIN=hermes.teleport.computer
      - DNS_PROVIDER=cloudflare
      - CLOUDFLARE_API_TOKEN
      - GATEWAY_DOMAIN=_.dstack-pha-prod9.phala.network
      - CERTBOT_EMAIL=james@generalsemantics.nyc
      - SET_CAA=true
      - TARGET_ENDPOINT=http://router:3000
      - PORT=444
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - hermes-cert-data-cf:/etc/letsencrypt
    depends_on:
      - router
    restart: unless-stopped

volumes:
  router-data:
  shape-matrix-bridge-data:
  cert-data-cf:
  hermes-cert-data-cf:
